spring.application.name=RouteShare
# Configuration is externalized (12-factor / DevOps configuration management):
# environment variables override the local-development defaults below.
# Default targets XAMPP's MariaDB; Docker overrides the URL with jdbc:mysql://.
# The JDBC driver is deduced automatically from the URL scheme.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/routesharedb?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Google Maps Integration — key is injected via environment variable, never committed.
# The service falls back to a local distance approximation when the key is absent.
google.maps.api-key=${GOOGLE_MAPS_API_KEY:}

# Monitoring (DevOps practice area): health, info and metrics endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# OpenAPI documentation UI
springdoc.swagger-ui.path=/swagger-ui.html

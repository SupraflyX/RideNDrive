# ── Zero-dependency demo profile ────────────────────────────────────────────
# Runs the full application on an embedded H2 file database — no MySQL/XAMPP
# needed. Data persists in ./data/routesharedb.mv.db between restarts.
#
#   mvn spring-boot:run "-Dspring-boot.run.profiles=local"
#
spring.datasource.url=jdbc:h2:file:./data/routesharedb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Web console to inspect the database while the app runs: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
